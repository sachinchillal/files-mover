<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Files Mover</title>
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="manifest" href="site.webmanifest">

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script>
    tailwind.config = { darkMode: 'class' };
  </script>
  <style>
    html {
      background-color: #f3f4f6;
      color: #111827;
      height: 100%;
    }

    html.dark {
      background-color: #0f172a;
      color: #e5e7eb;
    }

    body {
      background-color: inherit;
      color: inherit;
      height: 100vh;
      overflow: hidden;
    }

    .app-shell {
      min-width: 1280px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .workspace-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 15rem minmax(0, 1fr);
      min-height: 0;
      flex: 1;
    }

    .browser-panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
      height: 100%;
    }

    .entry-list {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
    }

    .entry-row:focus-visible {
      outline: 2px solid #2563eb;
      outline-offset: -2px;
    }

    .panel-active {
      box-shadow: inset 0 0 0 2px #2563eb;
    }

    html.dark .panel-active {
      box-shadow: inset 0 0 0 2px #3b82f6;
    }
  </style>
</head>

<body>
  <div class="app-shell">
    <header
      class="shrink-0 flex items-center justify-between gap-6 px-5 py-3 border-b border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900">
      <a href="/" class="inline-flex items-center gap-2.5 text-blue-600 dark:text-blue-400 no-underline">
        <img src="favicon-32x32.png" alt="" width="28" height="28" class="shrink-0" aria-hidden="true">
        <h1 class="text-lg font-semibold m-0 tracking-tight text-gray-900 dark:text-gray-100">Files Mover</h1>
      </a>
      <div class="flex items-center gap-4">
        <nav class="flex items-center gap-4 text-sm">
          <a href="/zip-extractor/" class="text-gray-600 dark:text-gray-300 no-underline hover:text-blue-600 dark:hover:text-blue-400">Zip Extractor</a>
          <a href="/settings/" class="text-gray-600 dark:text-gray-300 no-underline hover:text-blue-600 dark:hover:text-blue-400">Settings</a>
        </nav>
        <div class="h-5 w-px bg-gray-200 dark:bg-gray-700" aria-hidden="true"></div>
        <div class="flex gap-1">
          <button type="button" id="btn-light"
            class="px-2.5 py-1 text-xs rounded border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 focus:ring-2 focus:ring-blue-500 focus:outline-none">Light</button>
          <button type="button" id="btn-dark"
            class="px-2.5 py-1 text-xs rounded border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 focus:ring-2 focus:ring-blue-500 focus:outline-none">Dark</button>
        </div>
      </div>
    </header>

    <div
      class="shrink-0 flex items-center gap-4 px-5 py-2.5 border-b border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800/60"
      aria-label="Directory pair selection">
      <label for="pair-select" class="text-xs font-semibold uppercase tracking-wide text-gray-500 dark:text-gray-400 shrink-0">Directory pair</label>
      <select id="pair-select"
        class="w-80 px-3 py-1.5 text-sm rounded border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 focus:ring-2 focus:ring-blue-500 focus:outline-none">
        <option value="">Loading pairs…</option>
      </select>
      <a href="/settings/" class="text-sm text-blue-600 dark:text-blue-400 no-underline hover:underline shrink-0">Manage pairs</a>
      <p id="pair-status" class="text-sm text-amber-700 dark:text-amber-400 m-0 hidden truncate" role="status"></p>
    </div>

    <div class="workspace-grid flex-1 border-b border-gray-200 dark:border-gray-700">
      <section id="panel-source" class="browser-panel border-r border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900"
        aria-label="Source directory browser">
        <div class="shrink-0 px-4 py-2.5 border-b border-gray-100 dark:border-gray-800 bg-gray-50 dark:bg-gray-800/40">
          <div class="flex items-center justify-between gap-3 mb-1.5">
            <h2 class="text-sm font-semibold m-0 text-gray-900 dark:text-gray-100 uppercase tracking-wide">Source</h2>
            <div class="flex items-center gap-2">
              <button type="button" id="source-select-all"
                class="px-2.5 py-1 text-xs font-medium rounded border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 focus:ring-2 focus:ring-blue-500 focus:outline-none">Select all</button>
              <button type="button" id="source-unselect-all"
                class="px-2.5 py-1 text-xs font-medium rounded border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 focus:ring-2 focus:ring-blue-500 focus:outline-none">Clear</button>
              <select id="source-sort"
                class="px-2 py-1 text-xs rounded border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 focus:ring-2 focus:ring-blue-500 focus:outline-none"
                aria-label="Sort source entries">
                <option value="title-asc">A–Z</option>
                <option value="title-desc">Z–A</option>
              </select>
            </div>
          </div>
          <nav id="source-breadcrumb"
            class="text-xs flex flex-wrap gap-1 items-center text-blue-600 dark:text-blue-400 min-h-[1.25rem]"
            aria-label="Source path"></nav>
        </div>
        <p id="source-error" class="text-xs text-red-600 dark:text-red-400 hidden px-4 py-2 m-0 border-b border-red-100 dark:border-red-900/30 bg-red-50 dark:bg-red-900/20" role="alert"></p>
        <ul id="source-entries"
          class="entry-list divide-y divide-gray-100 dark:divide-gray-800 list-none m-0 p-0">
        </ul>
        <p id="source-loading" class="text-xs text-gray-500 dark:text-gray-400 px-4 py-2 m-0 border-t border-gray-100 dark:border-gray-800 hidden">Loading…</p>
        <input type="hidden" id="source-selected-path" value="" />
      </section>

      <aside id="action-rail"
        class="flex flex-col justify-between gap-4 px-4 py-5 border-r border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900/80"
        aria-label="Transfer actions">
        <div>
          <p class="text-[0.65rem] font-semibold uppercase tracking-wider text-gray-500 dark:text-gray-400 m-0 mb-1.5">From</p>
          <div id="source-selection-summary"
            class="text-xs leading-relaxed text-gray-700 dark:text-gray-300 min-h-[3.5rem] max-h-28 overflow-y-auto rounded border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 px-2.5 py-2"
            aria-live="polite">Nothing selected</div>
        </div>

        <div class="flex flex-col gap-2.5">
          <button type="button" id="btn-start-copy" disabled
            class="w-full px-4 py-2.5 rounded-md text-sm font-semibold bg-gray-300 dark:bg-gray-700 text-gray-500 dark:text-gray-400 cursor-not-allowed">Copy →</button>
          <button type="button" id="btn-start-move" disabled
            class="w-full px-4 py-2.5 rounded-md text-sm font-semibold bg-gray-300 dark:bg-gray-700 text-gray-500 dark:text-gray-400 cursor-not-allowed">Move →</button>
          <p id="transfer-status" class="text-xs text-center text-gray-500 dark:text-gray-400 m-0 min-h-[2.5rem]" role="status"></p>
        </div>

        <div>
          <p class="text-[0.65rem] font-semibold uppercase tracking-wider text-gray-500 dark:text-gray-400 m-0 mb-1.5">To</p>
          <div id="dest-selection-summary"
            class="text-xs leading-relaxed text-gray-700 dark:text-gray-300 min-h-[3.5rem] rounded border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 px-2.5 py-2"
            aria-live="polite">Not selected</div>
          <input type="hidden" id="dest-selected-path" value="" />
        </div>
      </aside>

      <section id="panel-destination" class="browser-panel bg-white dark:bg-gray-900"
        aria-label="Destination directory browser">
        <div class="shrink-0 px-4 py-2.5 border-b border-gray-100 dark:border-gray-800 bg-gray-50 dark:bg-gray-800/40">
          <div class="flex items-center justify-between gap-3 mb-1.5">
            <h2 class="text-sm font-semibold m-0 text-gray-900 dark:text-gray-100 uppercase tracking-wide">Destination</h2>
            <select id="dest-sort"
              class="px-2 py-1 text-xs rounded border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 focus:ring-2 focus:ring-blue-500 focus:outline-none"
              aria-label="Sort destination entries">
              <option value="title-asc">A–Z</option>
              <option value="title-desc">Z–A</option>
            </select>
          </div>
          <nav id="dest-breadcrumb"
            class="text-xs flex flex-wrap gap-1 items-center text-blue-600 dark:text-blue-400 min-h-[1.25rem]"
            aria-label="Destination path"></nav>
        </div>
        <label for="dest-current-folder"
          class="shrink-0 flex items-center gap-2 mx-4 mt-2 mb-1 px-2.5 py-1.5 text-xs text-gray-700 dark:text-gray-300 cursor-pointer rounded border border-dashed border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-800/50 hover:bg-gray-100 dark:hover:bg-gray-800">
          <input type="radio" name="dest-selection" id="dest-current-folder"
            class="shrink-0 border-gray-300 dark:border-gray-600" />
          <span id="dest-folder-label">Use this folder: / (root)</span>
        </label>
        <p id="dest-error" class="text-xs text-red-600 dark:text-red-400 hidden px-4 py-2 m-0 border-b border-red-100 dark:border-red-900/30 bg-red-50 dark:bg-red-900/20" role="alert"></p>
        <ul id="dest-entries"
          class="entry-list divide-y divide-gray-100 dark:divide-gray-800 list-none m-0 p-0">
        </ul>
        <p id="dest-loading" class="text-xs text-gray-500 dark:text-gray-400 px-4 py-2 m-0 border-t border-gray-100 dark:border-gray-800 hidden">Loading…</p>
      </section>
    </div>

    <section
      class="shrink-0 flex items-center gap-3 px-5 py-2.5 border-t border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900"
      aria-label="Ignore directories">
      <span class="text-xs font-semibold uppercase tracking-wide text-gray-500 dark:text-gray-400 shrink-0">Ignore</span>
      <input type="text" id="ignore-input"
        class="w-48 px-2.5 py-1.5 text-sm rounded border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 focus:ring-2 focus:ring-blue-500 focus:outline-none"
        placeholder="e.g. node_modules" />
      <button type="button" id="ignore-add"
        class="px-3 py-1.5 text-sm rounded bg-gray-800 dark:bg-gray-700 text-white hover:bg-gray-900 dark:hover:bg-gray-600 focus:ring-2 focus:ring-blue-500 focus:outline-none shrink-0">Add</button>
      <div id="ignore-chips" class="flex flex-wrap gap-1.5 min-w-0 flex-1"></div>
    </section>
  </div>

  <script>
    const API_BASE_URL = '/api';
    const THEME_KEY = 'files-mover-theme';
    const IGNORE_STORAGE_KEY = 'files-mover-ignore-list';
    const PAIR_STORAGE_KEY = 'files-mover-pair-id';
    const SORT_ASC = 'title-asc';
    const SORT_DESC = 'title-desc';
    const PANEL_SORT_KEYS = {
      source: 'files-mover-source-sort',
      destination: 'files-mover-dest-sort',
    };
    const THEME_DARK = 'dark';
    const THEME_LIGHT = 'light';

    const FOLDER_SVG = '<svg class="w-4 h-4 shrink-0 text-amber-500" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>';
    const FILE_SVG = '<svg class="w-4 h-4 shrink-0 text-gray-400" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm-1 7V3.5L18.5 9H13z"/></svg>';

    const panels = {};

    let ignoreList = loadIgnoreList();
    let activePanelId = 'source';
    let directoryPairs = [];
    let selectedPairId = '';

    function createPanelState(id) {
      const prefix = id === 'source' ? 'source' : 'dest';
      const sectionId = id === 'source' ? 'panel-source' : 'panel-destination';
      const els = {
        section: document.getElementById(sectionId),
        selectedPath: document.getElementById(`${prefix}-selected-path`),
        selectionSummary: document.getElementById(`${prefix}-selection-summary`),
        breadcrumb: document.getElementById(`${prefix}-breadcrumb`),
        error: document.getElementById(`${prefix}-error`),
        entries: document.getElementById(`${prefix}-entries`),
        loading: document.getElementById(`${prefix}-loading`),
        sortSelect: document.getElementById(`${prefix}-sort`),
      };
      if (id === 'source') {
        els.selectAll = document.getElementById('source-select-all');
        els.unselectAll = document.getElementById('source-unselect-all');
      } else {
        els.currentFolderRadio = document.getElementById('dest-current-folder');
        els.folderLabel = document.getElementById('dest-folder-label');
      }
      for (const [key, el] of Object.entries(els)) {
        if (!el) console.error(`Missing #${prefix} element for ${key}`);
      }
      const state = {
        id,
        currentRoot: '',
        selectedPath: '',
        selectedItems: new Set(),
        currentEntries: [],
        parent: '',
        loading: false,
        sortOrder: loadPanelSortOrder(id),
        els,
      };
      return state;
    }

    function loadPanelSortOrder(panelId) {
      try {
        const stored = localStorage.getItem(PANEL_SORT_KEYS[panelId]);
        return stored === SORT_DESC ? SORT_DESC : SORT_ASC;
      } catch {
        return SORT_ASC;
      }
    }

    function savePanelSortOrder(panelId, sortOrder) {
      try {
        localStorage.setItem(PANEL_SORT_KEYS[panelId], sortOrder);
      } catch {
        // ignore storage errors
      }
    }

    function sortEntriesByTitle(entries, sortOrder) {
      const sorted = [...entries];
      sorted.sort((a, b) => {
        const cmp = a.name.localeCompare(b.name, 'en', { numeric: true, sensitivity: 'base' });
        return sortOrder === SORT_DESC ? -cmp : cmp;
      });
      return sorted;
    }

    function onPanelSortChange(panel) {
      panel.sortOrder = panel.els.sortSelect.value;
      savePanelSortOrder(panel.id, panel.sortOrder);
      renderEntries(panel, panel.currentEntries);
    }

    function formatFolderLabel(root) {
      return root ? root : '/ (root)';
    }

    function renderDestCurrentFolderRadio(panel) {
      if (panel.id !== 'destination') return;
      const label = formatFolderLabel(panel.currentRoot);
      panel.els.folderLabel.textContent = `Use this folder: ${label}`;
      if (panel.els.currentFolderRadio) {
        panel.els.currentFolderRadio.checked = panel.selectedPath === panel.currentRoot;
      }
    }

    function selectDestination(panel, path) {
      panel.selectedPath = path;
      updateSelectedSummary(panel);
      updateActionButtonState();
      renderDestCurrentFolderRadio(panel);
      renderEntries(panel, panel.currentEntries);
    }

    function entryPath(panel, name) {
      return panel.currentRoot ? `${panel.currentRoot}/${name}` : name;
    }

    function clearPanelSelection(panel) {
      if (panel.id === 'source') {
        panel.selectedItems.clear();
      } else {
        panel.selectedPath = '';
      }
      updateSelectedSummary(panel);
      updateActionButtonState();
    }

    function updateSelectedSummary(panel) {
      if (panel.id === 'source') {
        const items = [...panel.selectedItems];
        if (!items.length) {
          panel.els.selectedPath.value = '';
          panel.els.selectionSummary.textContent = 'Nothing selected';
        } else {
          const names = items.map((p) => {
            const parts = p.split('/');
            return parts[parts.length - 1] || p;
          });
          const summary = `${items.length} item${items.length === 1 ? '' : 's'}: ${names.join(', ')}`;
          panel.els.selectedPath.value = summary;
          panel.els.selectionSummary.textContent = summary;
        }
      } else {
        const label = panel.selectedPath ? formatFolderLabel(panel.selectedPath) : '';
        panel.els.selectedPath.value = label;
        panel.els.selectionSummary.textContent = label || 'Not selected';
      }
    }

    function selectAllInPanel(panel) {
      if (panel.id !== 'source' || !panel.currentEntries?.length) return;

      panel.currentEntries.forEach((entry) => {
        if (entry.type === 'file' && isDeniedFile(entry.name)) return;
        const path = entryPath(panel, entry.name);
        if (path.trim() !== '') {
          panel.selectedItems.add(path);
        }
      });

      renderEntries(panel, panel.currentEntries);
      updateSelectedSummary(panel);
      updateActionButtonState();
    }

    function unselectAllInPanel(panel) {
      if (panel.id !== 'source') return;

      panel.selectedItems.clear();
      renderEntries(panel, panel.currentEntries);
      updateSelectedSummary(panel);
      updateActionButtonState();
    }

    function loadIgnoreList() {
      try {
        const raw = localStorage.getItem(IGNORE_STORAGE_KEY);
        if (!raw) return ['node_modules', '.git'];
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed.filter(Boolean) : ['node_modules', '.git'];
      } catch {
        return ['node_modules', '.git'];
      }
    }

    function saveIgnoreList() {
      localStorage.setItem(IGNORE_STORAGE_KEY, JSON.stringify(ignoreList));
    }

    function initTheme() {
      const stored = localStorage.getItem(THEME_KEY);
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = stored === THEME_DARK || stored === THEME_LIGHT
        ? stored
        : (prefersDark ? THEME_DARK : THEME_LIGHT);
      applyTheme(theme);
      document.getElementById('btn-dark').addEventListener('click', () => applyTheme(THEME_DARK));
      document.getElementById('btn-light').addEventListener('click', () => applyTheme(THEME_LIGHT));
    }

    function applyTheme(theme) {
      document.documentElement.classList.toggle('dark', theme === THEME_DARK);
      localStorage.setItem(THEME_KEY, theme);
    }

    function setActivePanel(panelId) {
      activePanelId = panelId;
      Object.values(panels).forEach((panel) => {
        panel.els.section?.classList.toggle('panel-active', panel.id === panelId);
      });
    }

    function pairLabel(pair) {
      return pair.title || pair.source.path;
    }

    function loadSelectedPairId() {
      return localStorage.getItem(PAIR_STORAGE_KEY) || '';
    }

    function saveSelectedPairId(pairId) {
      if (pairId) {
        localStorage.setItem(PAIR_STORAGE_KEY, pairId);
      } else {
        localStorage.removeItem(PAIR_STORAGE_KEY);
      }
    }

    function showPairStatus(message) {
      const el = document.getElementById('pair-status');
      if (!message) {
        el.textContent = '';
        el.classList.add('hidden');
        return;
      }
      el.textContent = message;
      el.classList.remove('hidden');
    }

    function renderPairSelect() {
      const select = document.getElementById('pair-select');
      select.innerHTML = '';

      if (!directoryPairs.length) {
        const option = document.createElement('option');
        option.value = '';
        option.textContent = 'No directory pairs configured';
        select.appendChild(option);
        select.disabled = true;
        selectedPairId = '';
        showPairStatus('Add a directory pair in Settings before browsing or copying.');
        return;
      }

      select.disabled = false;
      directoryPairs.forEach((pair) => {
        const option = document.createElement('option');
        option.value = pair.id;
        option.textContent = pairLabel(pair);
        select.appendChild(option);
      });

      const stored = loadSelectedPairId();
      const validStored = directoryPairs.some((pair) => pair.id === stored);
      selectedPairId = validStored ? stored : directoryPairs[0].id;
      select.value = selectedPairId;
      saveSelectedPairId(selectedPairId);
      showPairStatus('');
    }

    async function loadDirectoryPairs() {
      const response = await fetch(`${API_BASE_URL}/settings`);
      const data = await response.json();
      if (!response.ok) {
        throw new Error(data.message || 'Failed to load directory pairs');
      }
      directoryPairs = Array.isArray(data.directories) ? data.directories : [];
      renderPairSelect();
    }

    function onPairChange() {
      selectedPairId = document.getElementById('pair-select').value;
      saveSelectedPairId(selectedPairId);
      panels.source.selectedItems.clear();
      panels.source.currentRoot = '';
      panels.destination.currentRoot = '';
      panels.destination.selectedPath = '';
      updateSelectedSummary(panels.source);
      updateSelectedSummary(panels.destination);
      updateActionButtonState();
      refreshAllPanels();
    }

    function buildBrowseUrl(panel, root) {
      const params = new URLSearchParams();
      if (selectedPairId) params.set('pairId', selectedPairId);
      if (root) params.set('root', root);
      if (ignoreList.length) params.set('ignore', ignoreList.join(','));
      const qs = params.toString();
      const endpoint = panel.id === 'source' ? '/source/browse' : '/destination/browse';
      return `${API_BASE_URL}${endpoint}${qs ? `?${qs}` : ''}`;
    }

    function showPanelError(panel, message) {
      const el = panel.els.error;
      if (!message) {
        el.textContent = '';
        el.classList.add('hidden');
        return;
      }
      el.textContent = message;
      el.classList.remove('hidden');
    }

    function setPanelLoading(panel, loading) {
      panel.loading = loading;
      panel.els.loading.classList.toggle('hidden', !loading);
    }

    const ROW_CLICK_DELAY_MS = 250;
    const SELECTED_ROW_CLASSES = ['bg-blue-50', 'dark:bg-blue-900/20'];

    function setRowSelected(li, selected) {
      SELECTED_ROW_CLASSES.forEach((cls) => li.classList.toggle(cls, selected));
    }

    function createOpenButton(name, onOpen) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.textContent = 'Open';
      btn.className = 'shrink-0 px-2 py-0.5 text-xs font-medium rounded border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 focus:ring-2 focus:ring-blue-500 focus:outline-none';
      btn.setAttribute('aria-label', `Open ${name}`);
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        onOpen();
      });
      return btn;
    }

    function bindRowSelectAndOpen(li, { onSelect, onOpen }) {
      let clickTimer = null;

      li.addEventListener('click', (e) => {
        if (e.target.closest('input, button')) return;

        if (clickTimer) clearTimeout(clickTimer);
        clickTimer = setTimeout(() => {
          clickTimer = null;
          onSelect();
        }, ROW_CLICK_DELAY_MS);
      });

      if (onOpen) {
        li.addEventListener('dblclick', (e) => {
          if (e.target.closest('input, button')) return;
          if (clickTimer) {
            clearTimeout(clickTimer);
            clickTimer = null;
          }
          onOpen();
        });
      }
    }

    function renderBreadcrumb(panel, path) {
      const nav = panel.els.breadcrumb;
      nav.innerHTML = '';

      const rootBtn = document.createElement('button');
      rootBtn.type = 'button';
      rootBtn.className = 'hover:underline focus:outline-none focus:underline';
      rootBtn.textContent = '/';
      rootBtn.addEventListener('click', () => navigatePanel(panel, ''));
      nav.appendChild(rootBtn);

      if (!path) return;

      const segments = path.split('/').filter(Boolean);
      let accumulated = '';
      segments.forEach((seg, index) => {
        nav.appendChild(document.createTextNode(' / '));
        accumulated = accumulated ? `${accumulated}/${seg}` : seg;
        const target = accumulated;
        const isLast = index === segments.length - 1;
        if (isLast) {
          const span = document.createElement('span');
          span.className = 'text-gray-700 dark:text-gray-300';
          span.textContent = seg;
          nav.appendChild(span);
        } else {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'hover:underline focus:outline-none focus:underline';
          btn.textContent = seg;
          btn.addEventListener('click', () => navigatePanel(panel, target));
          nav.appendChild(btn);
        }
      });
    }

    function renderEntries(panel, entries) {
      const list = panel.els.entries;
      list.innerHTML = '';
      const sortedEntries = sortEntriesByTitle(entries, panel.sortOrder);

      if (panel.parent !== '' || panel.currentRoot !== '') {
        const upLi = document.createElement('li');
        upLi.className = 'entry-row flex items-center gap-2 px-3 py-2 cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-800 text-blue-600 dark:text-blue-400 font-medium';
        upLi.innerHTML = `${FOLDER_SVG}<span>.. (parent)</span>`;
        upLi.addEventListener('click', () => navigatePanel(panel, panel.parent));
        list.appendChild(upLi);
      }

      if (!sortedEntries.length && panel.currentRoot === '' && (panel.parent === '' || panel.parent === undefined)) {
        const empty = document.createElement('li');
        empty.className = 'px-3 py-4 text-sm text-gray-500 dark:text-gray-400 text-center';
        empty.textContent = 'This folder is empty.';
        list.appendChild(empty);
        return;
      }

      if (!sortedEntries.length) {
        return;
      }

      sortedEntries.forEach((entry) => {
        const li = document.createElement('li');
        const isDir = entry.type === 'directory';
        const path = entryPath(panel, entry.name);

        if (panel.id === 'source') {
          const denied = !isDir && isDeniedFile(entry.name);
          const isSelected = !denied && panel.selectedItems.has(path);
          const selectedClass = isSelected ? ' bg-blue-50 dark:bg-blue-900/20' : '';
          const baseRowClass = 'entry-row flex items-center gap-2 px-3 py-2';
          const hoverClass = 'hover:bg-gray-50 dark:hover:bg-gray-800';

          li.className = isDir
            ? `${baseRowClass} ${hoverClass}${selectedClass} cursor-pointer font-medium text-gray-900 dark:text-gray-100`
            : denied
              ? `${baseRowClass} text-gray-400 dark:text-gray-500`
              : `${baseRowClass} ${hoverClass}${selectedClass} cursor-pointer text-gray-500 dark:text-gray-400`;

          let checkbox;
          if (!denied) {
            checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.className = 'shrink-0 rounded border-gray-300 dark:border-gray-600';
            checkbox.setAttribute('aria-label', `Select ${entry.name}`);
            checkbox.checked = isSelected;
            checkbox.addEventListener('click', (e) => e.stopPropagation());
            checkbox.addEventListener('change', () => {
              if (checkbox.checked) panel.selectedItems.add(path);
              else panel.selectedItems.delete(path);
              if (path.trim() === '') {
                panel.selectedItems.delete(path);
              }
              setRowSelected(li, checkbox.checked);
              updateSelectedSummary(panel);
              updateActionButtonState();
            });
            li.appendChild(checkbox);
          } else {
            const spacer = document.createElement('span');
            spacer.className = 'w-4 shrink-0';
            spacer.setAttribute('aria-hidden', 'true');
            li.appendChild(spacer);
          }

          const iconSpan = document.createElement('span');
          iconSpan.innerHTML = isDir ? FOLDER_SVG : FILE_SVG;
          li.appendChild(iconSpan);

          const label = document.createElement('span');
          label.className = denied ? 'flex-1 italic min-w-0 truncate' : 'flex-1 min-w-0 truncate';
          label.textContent = denied ? `${entry.name} (not copyable)` : entry.name;
          li.appendChild(label);

          if (!denied) {
            const toggleSelection = () => {
              if (panel.selectedItems.has(path)) {
                panel.selectedItems.delete(path);
              } else if (path.trim() !== '') {
                panel.selectedItems.add(path);
              }
              checkbox.checked = panel.selectedItems.has(path);
              setRowSelected(li, checkbox.checked);
              updateSelectedSummary(panel);
              updateActionButtonState();
            };

            bindRowSelectAndOpen(li, {
              onSelect: toggleSelection,
              onOpen: isDir ? () => navigatePanel(panel, path) : undefined,
            });

            if (isDir) {
              li.appendChild(createOpenButton(entry.name, () => navigatePanel(panel, path)));
            }
          }
        } else if (isDir) {
          const isSelected = panel.selectedPath === path;
          li.className = `entry-row flex items-center gap-2 px-3 py-2 cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-800 font-medium text-gray-900 dark:text-gray-100${isSelected ? ' bg-blue-50 dark:bg-blue-900/20' : ''}`;

          const radio = document.createElement('input');
          radio.type = 'radio';
          radio.name = 'dest-selection';
          radio.className = 'shrink-0 border-gray-300 dark:border-gray-600';
          radio.setAttribute('aria-label', `Select ${entry.name} as destination`);
          radio.checked = isSelected;
          radio.addEventListener('click', (e) => e.stopPropagation());
          radio.addEventListener('change', () => selectDestination(panel, path));
          li.appendChild(radio);

          const iconSpan = document.createElement('span');
          iconSpan.innerHTML = FOLDER_SVG;
          li.appendChild(iconSpan);

          const label = document.createElement('span');
          label.className = 'flex-1 min-w-0 truncate';
          label.textContent = entry.name;
          li.appendChild(label);

          bindRowSelectAndOpen(li, {
            onSelect: () => selectDestination(panel, path),
            onOpen: () => navigatePanel(panel, path),
          });

          li.appendChild(createOpenButton(entry.name, () => navigatePanel(panel, path)));
        } else {
          li.className = 'entry-row flex items-center gap-2 px-3 py-2 text-gray-500 dark:text-gray-400';
          const spacer = document.createElement('span');
          spacer.className = 'w-4 shrink-0';
          spacer.setAttribute('aria-hidden', 'true');
          li.appendChild(spacer);

          const iconSpan = document.createElement('span');
          iconSpan.innerHTML = FILE_SVG;
          li.appendChild(iconSpan);

          const label = document.createElement('span');
          label.className = 'flex-1';
          label.textContent = entry.name;
          li.appendChild(label);
        }

        list.appendChild(li);
      });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function isDeniedFile(name) {
      const dot = name.lastIndexOf('.');
      if (dot < 0) return false;
      return name.slice(dot).toLowerCase() === '.lock';
    }

    function applyApiSelection(panel, selection) {
      if (!Array.isArray(selection) || !selection.length) {
        return;
      }

      if (panel.id === 'source') {
        selection.forEach((item) => {
          if (typeof item === 'string' && item.trim() !== '') {
            panel.selectedItems.add(item);
          }
        });
        return;
      }

      const path = selection.find((item) => typeof item === 'string' && item.trim() !== '');
      if (path) {
        panel.selectedPath = path;
      }
    }

    async function fetchBrowse(panel, root) {
      if (!selectedPairId) {
        panel.currentEntries = [];
        renderEntries(panel, []);
        showPanelError(panel, 'Select a directory pair first');
        return false;
      }

      setPanelLoading(panel, true);
      showPanelError(panel, '');

      try {
        const response = await fetch(buildBrowseUrl(panel, root));
        const data = await response.json();

        if (!response.ok) {
          showPanelError(panel, data.message || `Request failed (${response.status})`);
          return false;
        }

        panel.currentRoot = data.path ?? '';
        panel.parent = data.parent ?? '';
        panel.currentEntries = data.entries || [];
        applyApiSelection(panel, data.selection);
        renderBreadcrumb(panel, panel.currentRoot);
        renderEntries(panel, panel.currentEntries);
        if (panel.id === 'destination') {
          renderDestCurrentFolderRadio(panel);
        }
        updateSelectedSummary(panel);
        updateActionButtonState();
        return true;
      } catch (err) {
        showPanelError(panel, 'Failed to load directory listing');
        console.error(err);
        return false;
      } finally {
        setPanelLoading(panel, false);
      }
    }

    function navigatePanel(panel, root) {
      clearPanelSelection(panel);
      fetchBrowse(panel, root);
    }

    function refreshAllPanels() {
      if (!selectedPairId) {
        return;
      }
      fetchBrowse(panels.source, panels.source.currentRoot);
      fetchBrowse(panels.destination, panels.destination.currentRoot);
    }

    function renderIgnoreChips() {
      const container = document.getElementById('ignore-chips');
      container.innerHTML = '';

      if (!ignoreList.length) {
        return;
      }

      ignoreList.forEach((name) => {
        const chip = document.createElement('span');
        chip.className = 'inline-flex items-center gap-1 px-2 py-0.5 text-xs rounded-full bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200';
        chip.innerHTML = `<span>${escapeHtml(name)}</span>`;
        const removeBtn = document.createElement('button');
        removeBtn.type = 'button';
        removeBtn.className = 'ml-1 text-gray-600 dark:text-gray-300 hover:text-red-600 dark:hover:text-red-400 focus:outline-none';
        removeBtn.setAttribute('aria-label', `Remove ${name}`);
        removeBtn.textContent = '×';
        removeBtn.addEventListener('click', () => {
          ignoreList = ignoreList.filter((n) => n !== name);
          saveIgnoreList();
          renderIgnoreChips();
          refreshAllPanels();
        });
        chip.appendChild(removeBtn);
        container.appendChild(chip);
      });
    }

    function addIgnoreName(name) {
      const trimmed = name.trim();
      if (!trimmed || ignoreList.includes(trimmed)) return;
      ignoreList.push(trimmed);
      ignoreList.sort((a, b) => a.localeCompare(b, 'en', { numeric: true }));
      saveIgnoreList();
      renderIgnoreChips();
      refreshAllPanels();
    }

    const COPY_BTN_ENABLED =
      'w-full px-4 py-2.5 rounded-md text-sm font-semibold bg-blue-600 text-white hover:bg-blue-700 focus:ring-2 focus:ring-blue-500 focus:outline-none';
    const MOVE_BTN_ENABLED =
      'w-full px-4 py-2.5 rounded-md text-sm font-semibold bg-slate-700 text-white hover:bg-slate-800 focus:ring-2 focus:ring-blue-500 focus:outline-none dark:bg-slate-600 dark:hover:bg-slate-500';
    const ACTION_BTN_DISABLED =
      'w-full px-4 py-2.5 rounded-md text-sm font-semibold bg-gray-300 dark:bg-gray-700 text-gray-500 dark:text-gray-400 cursor-not-allowed';

    function updateActionButtonState() {
      const enabled = selectedPairId && panels.source && panels.destination &&
        panels.source.selectedItems.size > 0 &&
        panels.destination.selectedPath !== '';

      const copyBtn = document.getElementById('btn-start-copy');
      const moveBtn = document.getElementById('btn-start-move');
      copyBtn.disabled = !enabled;
      moveBtn.disabled = !enabled;
      copyBtn.className = enabled ? COPY_BTN_ENABLED : ACTION_BTN_DISABLED;
      moveBtn.className = enabled ? MOVE_BTN_ENABLED : ACTION_BTN_DISABLED;
    }

    function showTransferStatus(message, isError) {
      const el = document.getElementById('transfer-status');
      el.textContent = message;
      el.className = isError
        ? 'text-xs text-center text-red-600 dark:text-red-400 m-0 min-h-[2.5rem]'
        : 'text-xs text-center text-green-700 dark:text-green-400 m-0 min-h-[2.5rem]';
    }

    async function startTransfer(action) {
      const isCopy = action === 'copy';
      const btn = document.getElementById(isCopy ? 'btn-start-copy' : 'btn-start-move');
      const otherBtn = document.getElementById(isCopy ? 'btn-start-move' : 'btn-start-copy');
      const sources = [...panels.source.selectedItems].filter((p) => p.trim() !== '');
      const destination = panels.destination.selectedPath;
      const verb = isCopy ? 'copy' : 'move';
      const verbIng = isCopy ? 'Copying' : 'Moving';
      const verbPast = isCopy ? 'Copied' : 'Moved';
      const fileCountKey = isCopy ? 'copiedFiles' : 'movedFiles';
      const dirCountKey = isCopy ? 'copiedDirectories' : 'movedDirectories';

      if (!selectedPairId) {
        showTransferStatus('Select a directory pair first', true);
        return;
      }

      if (!sources.length) {
        showTransferStatus('No source items selected', true);
        return;
      }

      if (!destination) {
        showTransferStatus('Select a destination folder', true);
        return;
      }

      btn.disabled = true;
      otherBtn.disabled = true;
      btn.className = ACTION_BTN_DISABLED;
      otherBtn.className = ACTION_BTN_DISABLED;
      btn.textContent = isCopy ? 'Copying…' : 'Moving…';
      showTransferStatus('', false);

      try {
        const response = await fetch(`${API_BASE_URL}/${verb}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            pairId: selectedPairId,
            sources,
            destination,
            ignore: ignoreList.join(','),
          }),
        });
        const data = await response.json();

        if (!response.ok) {
          showTransferStatus(data.message || `${verbIng} failed (${response.status})`, true);
          return;
        }

        const destLabel = data.destination || destination;
        const fileCount = data[fileCountKey] ?? 0;
        const dirCount = data[dirCountKey] ?? 0;
        let status = `${verbPast} ${fileCount} file${fileCount === 1 ? '' : 's'} and ${dirCount} folder${dirCount === 1 ? '' : 's'} into ${destLabel}.`;
        if (data.skipped?.length) {
          status += ` Skipped ${data.skipped.length} ignored folder${data.skipped.length === 1 ? '' : 's'}.`;
        }
        showTransferStatus(status, false);
        panels.source.selectedItems.clear();
        updateSelectedSummary(panels.source);
        updateActionButtonState();
        refreshAllPanels();
      } catch (err) {
        showTransferStatus(`Failed to start ${verb}`, true);
        console.error(err);
      } finally {
        btn.textContent = isCopy ? 'Copy →' : 'Move →';
        updateActionButtonState();
      }
    }

    async function startCopy() {
      return startTransfer('copy');
    }

    async function startMove() {
      return startTransfer('move');
    }

    function init() {
      panels.source = createPanelState('source');
      panels.destination = createPanelState('destination');

      panels.source.els.selectAll.addEventListener('click', () => selectAllInPanel(panels.source));
      panels.source.els.unselectAll.addEventListener('click', () => unselectAllInPanel(panels.source));
      panels.source.els.sortSelect.value = panels.source.sortOrder;
      panels.source.els.sortSelect.addEventListener('change', () => onPanelSortChange(panels.source));
      panels.destination.els.sortSelect.value = panels.destination.sortOrder;
      panels.destination.els.sortSelect.addEventListener('change', () => onPanelSortChange(panels.destination));

      panels.destination.els.currentFolderRadio.addEventListener('change', () => {
        selectDestination(panels.destination, panels.destination.currentRoot);
      });

      panels.source.els.section.addEventListener('focusin', () => setActivePanel('source'));
      panels.destination.els.section.addEventListener('focusin', () => setActivePanel('destination'));
      panels.source.els.section.addEventListener('click', () => setActivePanel('source'));
      panels.destination.els.section.addEventListener('click', () => setActivePanel('destination'));

      document.getElementById('ignore-add').addEventListener('click', () => {
        const input = document.getElementById('ignore-input');
        addIgnoreName(input.value);
        input.value = '';
        input.focus();
      });

      document.getElementById('ignore-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          addIgnoreName(e.target.value);
          e.target.value = '';
        }
      });

      document.getElementById('btn-start-copy').addEventListener('click', startCopy);
      document.getElementById('btn-start-move').addEventListener('click', startMove);
      document.getElementById('pair-select').addEventListener('change', onPairChange);

      renderIgnoreChips();
      updateActionButtonState();
      setActivePanel('source');

      loadDirectoryPairs()
        .then(() => {
          if (selectedPairId) {
            fetchBrowse(panels.source, '').catch((err) => console.error('Source browse failed:', err));
            fetchBrowse(panels.destination, '').catch((err) => console.error('Destination browse failed:', err));
          }
        })
        .catch((err) => {
          showPairStatus('Failed to load directory pairs');
          console.error(err);
        });
    }

    initTheme();
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
